openapi: 3.0.0
info:
  title: wAI API
  description: wAI
  version: 1.0.0
  contact:
    name: API Support
  license:
    name: Apache 2.0

servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://api.example.com
    description: Production

security:
  - BearerAuth: []

paths:
  /login:
    post:
      summary: ログイン
      description: Firebase ID Token を検証し、ユーザーを登録または取得します
      tags:
        - auth
      operationId: login
      security:
        - BearerAuth: []
      responses:
        "200":
          description: ログイン成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: 認証エラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /health:
    get:
      summary: ヘルスチェック
      description: アプリケーションのヘルスステータスを確認します
      tags:
        - health
      operationId: healthCheck
      security: []
      responses:
        "200":
          description: 正常なレスポンス
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: サービス利用不可
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Firebase ID Token

  schemas:
    LoginResponse:
      type: object
      required:
        - id
        - firebase_uid
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: ユーザーID
        firebase_uid:
          type: string
          description: Firebase UID
        email:
          type: string
          description: メールアドレス
        display_name:
          type: string
          description: 表示名
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
        message:
          type: string

    HealthResponse:
      type: object
      required:
        - status
        - timestamp
        - version
      properties:
        status:
          type: string
          description: ヘルスステータス
          example: healthy
          enum:
            - healthy
            - unhealthy
        timestamp:
          type: string
          format: date-time
          description: レスポンスの時刻
          example: "2026-03-14T10:00:00Z"
        version:
          type: string
          description: API バージョン
          example: 1.0.0
